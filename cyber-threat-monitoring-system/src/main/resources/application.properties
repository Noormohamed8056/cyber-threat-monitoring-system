# ==========================================
# APPLICATION NAME
# ==========================================
spring.application.name=cyber-threat-monitoring-system

# ==========================================
# MYSQL DATABASE CONFIGURATION (AIVEN)
# ==========================================
spring.datasource.url=jdbc:mysql://mysql-1760765b-cyber-threat-monitoring-system.e.aivencloud.com:15996/defaultdb?sslMode=REQUIRED
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONNECTION POOL CONFIGURATION
# ==========================================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=12
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ==========================================
# JPA / HIBERNATE CONFIGURATION
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt.secret=CyberThreatMonitoringSystemSecretKey2024ProjectVeryLongSecureKey
jwt.expiration=604800000

# ==========================================
# SERVER CONFIGURATION
# ==========================================
server.port=8080

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.com.project=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ==========================================
# FILE UPLOAD CONFIGURATION
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB

# ==========================================
# INTELLIGENCE ENGINE CONFIGURATION
# ==========================================
intelligence.sandbox.timeout=5000
intelligence.ml.confidence-threshold=0.65
intelligence.spread.max-depth=3
intelligence.timeline.max-events=50
intelligence.storage.upload-dir=uploads/

# ==========================================
# ML SERVICE
# ==========================================
ml.service.predict-url=http://localhost:8000/predict